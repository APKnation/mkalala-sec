{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">Library Book Search</h2>
<form method="get" class="mb-4">
  <input type="text" name="q" value="{{ query }}" placeholder="Search by title..." class="border p-2 w-1/2">
  <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Search</button>
</form>

<table class="w-full table-auto border">
  <thead class="bg-gray-200">
    <tr><th>Title</th><th>Author</th><th>Category</th><th>Available</th></tr>
  </thead>
  <tbody>
    {% for book in books %}
    <tr class="border-t">
      <td>{{ book.title }}</td>
      <td>{{ book.author }}</td>
      <td>{{ book.category }}</td>
      <td>{{ book.available_copies }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No books found.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
