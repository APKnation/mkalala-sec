{% extends "core/base.html" %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">E-Library Resources</h2>

<ul class="list-disc ml-6">
  {% for book in ebooks %}
  <li>
    <strong>{{ book.title }}</strong> by {{ book.author }}
    {% if book.ebook_file %}
      — <a href="{{ book.ebook_file.url }}" class="text-blue-600 underline" download>Download</a>
    {% else %}
      (No file uploaded)
    {% endif %}
  </li>
  {% endfor %}
</ul>
{% endblock %}
