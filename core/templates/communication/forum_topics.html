{% extends 'core/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <div class="mb-8">
        <h1 class="text-4xl font-bold text-orange-700 mb-2">Forum Topics</h1>
        <div class="h-1 w-20 bg-orange-500 rounded-full"></div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-lg border border-orange-100">
        <h2 class="text-2xl font-semibold text-orange-800 mb-6">Available Topics</h2>
        
        <div class="space-y-6">
            {% for topic in topics %}
                <div class="p-5 bg-gradient-to-r from-orange-50 to-amber-50 rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200 border-l-4 border-orange-500">
                    <h3 class="text-xl font-medium text-orange-900 mb-2">{{ topic.title }}</h3>
                    <p class="text-orange-800 mb-3">{{ topic.description }}</p>
                    <a href="{% url 'topic_detail' topic.id %}" class="inline-flex items-center text-orange-600 hover:text-orange-800 font-medium transition-colors duration-200">
                        Read more
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1.5 transition-transform duration-200 group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" class="text-orange-500"/>
                        </svg>
                    </a>
                </div>
            {% empty %}
                <div class="text-center py-12 bg-orange-50 rounded-lg">
                    <div class="relative inline-block">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mx-auto text-orange-300" viewBox="0 0 24 24" fill="currentColor">
                            <path fill-rule="evenodd" d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zm0 18a8.25 8.25 0 110-16.5 8.25 8.25 0 010 16.5z" clip-rule="evenodd" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01" />
                        </svg>
                    </div>
                    <p class="mt-4 text-lg text-orange-700 font-medium">No topics available at the moment.</p>
                    <p class="text-orange-600">Check back later or create a new topic!</p>
                </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
