{% extends "base.html" %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">Grades for {{ child.user.get_full_name }}</h2>

<table class="w-full table-auto border">
  <thead class="bg-gray-200"><tr><th>Course</th><th>Exam Type</th><th>Score</th></tr></thead>
  <tbody>
    {% for grade in grades %}
    <tr>
      <td>{{ grade.course.name }}</td>
      <td>{{ grade.exam_type }}</td>
      <td>{{ grade.score }}/{{ grade.max_score }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
