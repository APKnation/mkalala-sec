{% extends "base.html" %}
{% block content %}
<h2>Update Profile</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
        <h3>Personal Info</h3>
        {{ user_form.as_p }}
    </div>
    <div class="form-group">
        <h3>Academic Details</h3>
        {{ profile_form.as_p }}
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
</form>
{% endblock %}
