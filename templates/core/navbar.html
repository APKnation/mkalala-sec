{% load static %}
<nav class="navbar-modern">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <a href="{% url 'public_home' %}" class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-school-blue rounded-lg flex items-center justify-center text-white">
            <i class="fas fa-graduation-cap text-lg"></i>
          </div>
          <span class="text-xl font-bold text-gray-900">Mkalala Secondary</span>
        </a>
      </div>
      
      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8">
        <a href="{% url 'public_home' %}" class="nav-link-simple">Home</a>
        <a href="{% url 'public_about' %}" class="nav-link-simple">About</a>
        <a href="{% url 'public_courses' %}" class="nav-link-simple">Subjects</a>
        <a href="{% url 'public_contact' %}" class="nav-link-simple">Contact</a>
        
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}" class="btn-simple">Dashboard</a>
          <a href="{% url 'logout' %}" class="nav-link-simple">Logout</a>
        {% else %}
          <a href="{% url 'login' %}" class="nav-link-simple">Sign In</a>
          <a href="{% url 'register' %}" class="btn-simple">Get Started</a>
        {% endif %}
      </div>
      
      <!-- Mobile menu button -->
      <div class="md:hidden">
        <button id="mobile-menu-btn" class="text-gray-600 hover:text-gray-900 p-2">
          <i class="fas fa-bars text-xl"></i>
        </button>
      </div>
    </div>
  </div>
  
  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden md:hidden bg-white border-t">
    <div class="px-4 py-2 space-y-1">
      <a href="{% url 'public_home' %}" class="block py-2 text-gray-600">Home</a>
      <a href="{% url 'public_about' %}" class="block py-2 text-gray-600">About</a>
      <a href="{% url 'public_courses' %}" class="block py-2 text-gray-600">Subjects</a>
      <a href="{% url 'public_contact' %}" class="block py-2 text-gray-600">Contact</a>
      
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="block py-2 text-gray-600">Dashboard</a>
        <a href="{% url 'logout' %}" class="block py-2 text-gray-600">Logout</a>
      {% else %}
        <a href="{% url 'login' %}" class="block py-2 text-gray-600">Sign In</a>
        <a href="{% url 'register' %}" class="block py-2 text-gray-600">Get Started</a>
      {% endif %}
    </div>
  </div>
</nav>

<style>
.navbar-modern {
  background: white;
  border-bottom: 1px solid #e5e7eb;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav-link-simple {
  color: #6b7280;
  font-weight: 500;
  transition: color 0.2s;
  position: relative;
}

.nav-link-simple:hover {
  color: #2563eb;
}

.nav-link-simple.active {
  color: #2563eb;
}

.nav-link-simple.active::after {
  content: '';
  position: absolute;
  bottom: -16px;
  left: 0;
  right: 0;
  height: 2px;
  background: #2563eb;
}

.btn-simple {
  background: #2563eb;
  color: white;
  padding: 0.5rem 1rem;
  border-radius: 0.375rem;
  font-weight: 500;
  transition: background-color 0.2s;
}

.btn-simple:hover {
  background: #1d4ed8;
}
</style>

<script>
document.getElementById('mobile-menu-btn')?.addEventListener('click', function() {
  document.getElementById('mobile-menu').classList.toggle('hidden');
});
</script>
