<!-- Admin Create Exam Content -->
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-slate-900 flex items-center">
                <i class="fas fa-plus mr-3 text-purple-600"></i>
                Create Exam
            </h1>
            <p class="mt-2 text-sm text-slate-600">Schedule a new examination</p>
        </div>
        <div class="flex space-x-3">
            <a href="{% url 'admin_unified_dashboard' page='exams' %}" class="bg-slate-600 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition-colors flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Back to Exams
            </a>
        </div>
    </div>

    <!-- Create Exam Form -->
    <div class="bg-white rounded-lg shadow border border-slate-200">
        <div class="p-6 border-b border-slate-200">
            <h2 class="text-lg font-semibold text-slate-900">Exam Details</h2>
        </div>
        
        <form method="post" class="p-6 space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="exam-title" class="block text-sm font-medium text-slate-700 mb-2">Exam Title *</label>
                    <input type="text" id="exam-title" name="title" required
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="e.g., Mid-Term Examination">
                </div>
                
                <div>
                    <label for="exam-course" class="block text-sm font-medium text-slate-700 mb-2">Course *</label>
                    <select id="exam-course" name="course" required
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select a course</option>
                        {% for course_offering in course_offerings %}
                            <option value="{{ course_offering.id }}">
                                {{ course_offering.course.name }} - {{ course_offering.course.code }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label for="exam-date" class="block text-sm font-medium text-slate-700 mb-2">Exam Date *</label>
                    <input type="date" id="exam-date" name="date" required
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <div>
                    <label for="exam-time" class="block text-sm font-medium text-slate-700 mb-2">Start Time *</label>
                    <input type="time" id="exam-time" name="start_time" required
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                
                <div>
                    <label for="exam-duration" class="block text-sm font-medium text-slate-700 mb-2">Duration (hours) *</label>
                    <input type="number" id="exam-duration" name="duration" min="0.5" max="8" step="0.5" required
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="e.g., 2">
                </div>
                
                <div>
                    <label for="exam-room" class="block text-sm font-medium text-slate-700 mb-2">Room/Location</label>
                    <input type="text" id="exam-room" name="room"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="e.g., Room 101, Main Hall">
                </div>
                
                <div>
                    <label for="exam-class" class="block text-sm font-medium text-slate-700 mb-2">Class</label>
                    <select id="exam-class" name="class"
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select a class (optional)</option>
                        {% for student_class in classes %}
                            <option value="{{ student_class.id }}">
                                Form {{ student_class.form_level }} - {{ student_class.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label for="exam-type" class="block text-sm font-medium text-slate-700 mb-2">Exam Type</label>
                    <select id="exam-type" name="exam_type"
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="regular">Regular Exam</option>
                        <option value="practical">Practical Exam</option>
                        <option value="oral">Oral Exam</option>
                        <option value="quiz">Quiz</option>
                        <option value="assignment">Assignment</option>
                    </select>
                </div>
                
                <div>
                    <label for="max-marks" class="block text-sm font-medium text-slate-700 mb-2">Maximum Marks</label>
                    <input type="number" id="max-marks" name="max_marks" min="1" max="1000"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="e.g., 100">
                </div>
            </div>
            
            <div>
                <label for="exam-instructions" class="block text-sm font-medium text-slate-700 mb-2">Instructions</label>
                <textarea id="exam-instructions" name="instructions" rows="4"
                          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                          placeholder="Special instructions for students..."></textarea>
            </div>
            
            <div class="flex justify-end space-x-3 pt-6 border-t border-slate-200">
                <a href="{% url 'admin_unified_dashboard' page='exams' %}" 
                   class="px-6 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors">
                    Cancel
                </a>
                <button type="submit" 
                        class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors flex items-center">
                    <i class="fas fa-save mr-2"></i>
                    Create Exam
                </button>
            </div>
        </form>
    </div>
    
    <!-- Quick Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white rounded-lg shadow border border-slate-200 p-6">
            <div class="flex items-center">
                <div class="p-3 bg-blue-100 rounded-full">
                    <i class="fas fa-calendar text-blue-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <p class="text-sm font-medium text-slate-600">Total Exams</p>
                    <p class="text-2xl font-bold text-slate-900">{{ total_exams|default:"0" }}</p>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow border border-slate-200 p-6">
            <div class="flex items-center">
                <div class="p-3 bg-green-100 rounded-full">
                    <i class="fas fa-clock text-green-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <p class="text-sm font-medium text-slate-600">Upcoming</p>
                    <p class="text-2xl font-bold text-slate-900">{{ upcoming_exams|default:"0" }}</p>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow border border-slate-200 p-6">
            <div class="flex items-center">
                <div class="p-3 bg-purple-100 rounded-full">
                    <i class="fas fa-users text-purple-600 text-xl"></i>
                </div>
                <div class="ml-4">
                    <p class="text-sm font-medium text-slate-600">Active Teachers</p>
                    <p class="text-2xl font-bold text-slate-900">{{ active_teachers|default:"0" }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
